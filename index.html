<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* Thay link ảnh nền của bạn vào đây */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('Planet9_Wallpaper_5000x2813.jpg');
            background-size: cover;
            background-position: center;
            font-family: Arial, sans-serif;
            color: #ffcc33; /* Màu chữ vàng như trong ảnh */
        }

        .links {
            margin-bottom: 20px;
        }

        .links a {
            color: #ffcc33;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            transition: 0.3s;
        }

        .links a:hover {
            text-shadow: 0 0 10px #ffcc33;
        }

        .btn-cv {
            background-color: #d4a017; /* Màu vàng đậm */
            color: #000;
            padding: 12px 35px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .btn-cv:hover {
            transform: scale(1.1);
            background-color: #ffcc33;
        }
    </style>
</head>
<body>

    <div class="links">
        <a href="https://www.facebook.com/tran.van.vinh.208675/?locale=vi_VN" target="_blank">Facebook</a>
        <a href="https://linkedin.com" target="_blank">LinkedIn</a>
        <a href="https://github.com" target="_blank">GitHub</a>
    </div>

    <a href="https://drive.google.com/drive/folders/1eGOE4uWwhVGD4cWbcgmkR7BXvj8A-0vd" class="btn-cv">Tải CV</a>

</body>
</html>
